# ============================================
# 生产环境 docker-compose 示例
# ============================================
# 使用方法：
# 1. 复制此文件为 docker-compose.yml
# 2. 修改环境变量（特别是密钥和 API key）
# 3. 运行 docker-compose up -d
# ============================================

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: zhiliao-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zhiliao
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zhiliao123}
      POSTGRES_DB: zhiliao
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhiliao"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zhiliao-network

  redis:
    image: redis:7-alpine
    container_name: zhiliao-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zhiliao-network

  server:
    image: ghcr.io/ylz17965/medical-diagnosis-automatic-recognition-system-server:latest
    container_name: zhiliao-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://zhiliao:${POSTGRES_PASSWORD:-zhiliao123}@postgres:5432/zhiliao
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost
      - JWT_SECRET=${JWT_SECRET}
      - REFRESH_TOKEN_EXPIRES_IN=7d
      - COOKIE_SECRET=${COOKIE_SECRET}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - QWEN_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - zhiliao-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    image: ghcr.io/ylz17965/medical-diagnosis-automatic-recognition-system-web:latest
    container_name: zhiliao-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - zhiliao-network

volumes:
  postgres_data:
  redis_data:

networks:
  zhiliao-network:
    driver: bridge
